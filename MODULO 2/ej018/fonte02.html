<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes com google fonts</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <style>
        
        @import url('https://fonts.googleapis.com/css2?family=Kings&display=swap'); 

        @import url('https://fonts.googleapis.com/css2?family=Eagle+Lake&family=Kings&display=swap');

        body {
            /*font-style -> font-weight -> font-size -> font-family*/
            font: 1em Arial, Helvetica, sans-serif;
            color: black;
        }

        h1{
            font-family: 'Kings', cursive;
            font-size: 3em;
        }

        p {
            font: 1em 'Eagle Lake', serif;
        }
    </style>
</head>
<body>
    <h1>Titulos</h1>
    <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Ipsum dolor asperiores nemo commodi? Voluptates eos sint ipsum quia, tempora officia, amet similique est totam fugit alias, repellat quasi obcaecati placeat!</p>
</body>
</html>
