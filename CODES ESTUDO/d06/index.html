<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <style>
        mark {background-color: greenyellow};
    </style>
</head>
<body>
    <h1>Tags em HTML</h1>
    <P>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso.</P>
    <ul type="square">
        <li><abbr title="Use a tag &lt;p&gt;">Parágrafos</abbr></li>
        <li><abbr title="Usar a tag &lt;h1&gt;. Usando a letra h e os numeros do 1 até 6">Títulos</abbr></li>
        <li><abbr title="Usar a tag img">Imagens</abbr></li>
        <li><abbr title="Usar a tag abbr">Abreviaçoes</abbr></li>
        <li><abbr title="Usar a tag &lt;code&gt;"> Codigo-fonte</abbr></li>
        <li><abbr title="Usar as tags &lt;ol&gt;, e &lt;li&gt;">Listas numeradas</abbr></li>
        <li><abbr title="Usar tags &lt;ul&gt;, e &lt;li&gt;">Listas com demarcadores</abbr></li>
        <li><abbr title="Usar a tag mark"><mark>Marcadores</mark></abbr></li>
    </ul>
</body>
</html>
